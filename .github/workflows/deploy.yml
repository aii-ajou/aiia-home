# 게시 파이프라인: main 에 push(=편집자 저장) → 검증 → 정적 빌드 → 배포.
# 빌드/검증 실패 시 배포가 생략되고 사이트는 이전 버전을 유지한다(작성자에게 GitHub 알림).
#
# 현재 대상: GitHub Pages(임시 공개 호스팅, https://aii-ajou.github.io/aiia-home/).
#   - 리포 Settings → Pages → Source 를 "GitHub Actions" 로 설정해야 한다(1회).
#   - 서브패스 호스팅이라 GITHUB_PAGES=true 로 base 를 적용하고, 동결 소스가 쓰는
#     절대경로(/brand, /uploads)는 빌드 산출물에서만 보정한다(소스 무수정).
# 대학 서버(rsync) 전환 시: deploy 잡을 rsync 스텝으로 교체하고 GITHUB_PAGES 를 끈다.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
      # 동결 소스(Base/Header/Footer)의 절대경로 에셋을 서브패스로 보정 — Pages 전용.
      - name: Rewrite absolute asset paths for subpath hosting
        run: |
          find dist -name '*.html' -exec sed -i \
            -e 's|src="/brand/|src="/aiia-home/brand/|g' \
            -e 's|href="/brand/|href="/aiia-home/brand/|g' \
            -e 's|content="/brand/|content="/aiia-home/brand/|g' \
            -e 's|src="/uploads/|src="/aiia-home/uploads/|g' \
            -e 's|url(/brand/|url(/aiia-home/brand/|g' \
            -e 's|url(/uploads/|url(/aiia-home/uploads/|g' \
            {} +
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
